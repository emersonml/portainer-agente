version: "3.8"

services:
  portainer-agent:
    image: portainer/agent:2.33.7
    container_name: portainer-agent
    restart: unless-stopped
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
      - /:/host
    networks:
      - agent_network

networks:
  agent_network:
    driver: bridge
